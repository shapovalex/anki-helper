<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pronunciation Practice — Anki Helper</title>
    <link rel="stylesheet" href="/static/css/theme.css">
    <style>
        .pronounce-text {
            font-family: var(--font-display);
            font-size: 2.5rem;
            font-weight: 700;
            text-align: center;
            color: var(--text);
            margin: 1.5rem 0;
            line-height: 1.2;
        }
        .score-badge {
            display: inline-block;
            padding: 0.35rem 0.75rem;
            border-radius: var(--radius);
            font-size: 0.82rem;
            font-weight: 600;
        }
        .score-green  { background: rgba(74, 140, 98, 0.15); border: 1px solid rgba(74, 140, 98, 0.35); color: var(--success-text); }
        .score-yellow { background: rgba(184, 140, 48, 0.15); border: 1px solid rgba(184, 140, 48, 0.35); color: var(--warn-text); }
        .score-red    { background: rgba(168, 74, 68, 0.15); border: 1px solid rgba(168, 74, 68, 0.35); color: var(--error-text); }
        .sub-scores {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }
        .phoneme-table {
            border: 1px solid var(--border, #2a2a2a);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 1rem;
        }
        .phoneme-table-header {
            background: var(--surface-2, #222);
            padding: 0.4rem 0.9rem;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border, #2a2a2a);
        }
        .phoneme-word-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.6rem 0.9rem;
            border-bottom: 1px solid var(--surface-2, #222);
        }
        .phoneme-word-row:last-child { border-bottom: none; }
        .word-col {
            min-width: 80px;
            flex-shrink: 0;
        }
        .word-col-name {
            font-weight: 600;
            font-size: 0.9rem;
        }
        .word-col-score {
            font-size: 0.7rem;
            opacity: 0.65;
            margin-top: 0.05rem;
        }
        .pills {
            display: flex;
            flex-wrap: wrap;
            gap: 0.35rem;
        }
        .phoneme-pill {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0.2rem 0.45rem 0.25rem;
            border-radius: 5px;
            min-width: 36px;
            gap: 0.15rem;
        }
        .phoneme-pill .pill-sym {
            font-family: var(--font-mono, monospace);
            font-size: 0.78rem;
            font-weight: 700;
            line-height: 1;
        }
        .phoneme-pill .pill-bar-wrap {
            width: 100%;
            height: 3px;
            background: rgba(255,255,255,0.08);
            border-radius: 2px;
            overflow: hidden;
        }
        .phoneme-pill .pill-bar-fill {
            height: 100%;
            border-radius: 2px;
        }
        .score-green .pill-bar-fill  { background: var(--success-text); }
        .score-yellow .pill-bar-fill { background: var(--warn-text); }
        .score-red .pill-bar-fill    { background: var(--error-text); }
        .phoneme-pill .pill-num {
            font-size: 0.62rem;
            opacity: 0.6;
            line-height: 1;
        }
        .rating-row {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .rating-row button { flex: 1; }
        #record-btn {
            position: relative;
            user-select: none;
        }
        #record-btn:active { transform: none; }
        #record-btn.recording {
            background: var(--error);
            color: white;
        }
        .word-colored { transition: color 0.2s; }
        .word-colored.score-green  { color: var(--success-text); }
        .word-colored.score-yellow { color: var(--warn-text); }
        .word-colored.score-red    { color: var(--error-text); }
        .record-status {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            min-height: 1.4rem;
            margin: 0.4rem 0;
        }
        .mic-bar {
            height: 4px;
            background: var(--surface-2, #2a2a2a);
            border-radius: 2px;
            margin: 0.3rem 0 0.2rem;
            overflow: hidden;
        }
        .mic-bar-fill {
            height: 100%;
            width: 0%;
            background: var(--primary, #5b8dee);
            border-radius: 2px;
            transition: width 0.05s linear;
        }
    </style>
</head>
<body>
    <div id="menu-container"></div>
    <main class="page page-sm">

        <!-- ── Phase 1: Setup ───────────────────────────────────── -->
        <div id="setup-phase">
            <div class="page-header">
                <h1 class="page-title">Pronunciation</h1>
                <p class="page-subtitle">Practice speaking Anki cards aloud with Azure Speech feedback.</p>
            </div>

            <div id="anki-banner" class="banner banner-error">
                Cannot reach Anki. Make sure Anki is running with Anki-Connect enabled.
            </div>
            <div id="azure-banner" class="banner banner-error">
                Azure key not configured. <a href="/settings">Go to Settings →</a>
            </div>

            <div class="field">
                <label>Deck</label>
                <select id="deck-select"></select>
            </div>
            <div class="field">
                <label>Text Field</label>
                <select id="text-field-select" disabled></select>
            </div>
            <div class="field">
                <label>Audio Field</label>
                <select id="audio-field-select" disabled></select>
            </div>
            <div class="field">
                <label>Language</label>
                <select id="language-select">
                    <option value="fr-FR">French</option>
                    <option value="en-US">English</option>
                </select>
            </div>
            <button id="start-btn" class="btn-primary btn-full" disabled>Start Practicing</button>
        </div>

        <!-- ── Phase 2: Card practice ───────────────────────────── -->
        <div id="card-phase" style="display:none;">

            <div id="no-cards-msg" style="display:none; text-align:center; padding: 3rem 0;">
                <p style="color: var(--text-muted); margin-bottom: 1rem;">No due cards in this deck.</p>
                <button class="btn-secondary" onclick="showSetup()">← Back to Setup</button>
            </div>

            <div id="card-content">
                <div class="pronounce-text" id="pronounce-text"></div>

                <button id="translate-btn" class="btn-secondary btn-full" style="margin-bottom:0.5rem;">Translate to Russian</button>
                <div id="translate-error" class="inline-error"></div>
                <div id="translation-panel" style="display:none; background:var(--surface-2,#222); border:1px solid var(--border,#2a2a2a); border-radius:8px; padding:0.75rem 1rem; margin-bottom:0.75rem;">
                    <p id="translation-text" style="margin:0; font-size:1rem; color:var(--text); line-height:1.4;"></p>
                </div>

                <div class="field">
                    <label>Reference Audio</label>
                    <audio id="ref-audio" controls style="width:100%; color-scheme:dark;"></audio>
                </div>

                <button id="record-btn" class="btn-primary btn-full">🎤 Hold to Record</button>
                <div class="mic-bar"><div class="mic-bar-fill" id="mic-bar-fill"></div></div>
                <p class="record-status" id="record-status"></p>

                <!-- Results -->
                <div id="results-section" style="display:none;">

                    <div id="overall-badge" class="eval-badge eval-warning" style="margin-bottom:0.5rem;"></div>
                    <div class="sub-scores" id="sub-scores"></div>

                    <div id="heard-row" class="field" style="display:none;">
                        <label>Azure heard</label>
                        <p id="heard-text" style="font-style:italic; color:var(--text-muted); font-size:0.9rem;"></p>
                    </div>

                    <div class="field">
                        <div id="words-container"></div>
                    </div>

                    <div class="field" id="recs-section">
                        <button id="get-recs-btn" class="btn-secondary" onclick="getRecommendations()">Get Recommendations</button>
                        <div id="recs-error" class="inline-error"></div>
                        <div id="recs-content" style="display:none; margin-top:0.75rem;"></div>
                    </div>

                    <div style="display:flex; gap:0.5rem; margin-bottom:1rem;">
                        <button class="btn-secondary" style="flex:1;" onclick="resetForRecording()">🎤 Record Again</button>
                        <button class="btn-secondary" id="replay-btn" style="flex:1; display:none;" onclick="playBackRecording()">▶ Play back recording</button>
                    </div>
                    <audio id="replay-audio" style="display:none;"></audio>

                    <div class="divider"></div>

                    <div class="rating-row">
                        <button class="btn-danger"   onclick="answerCard(1)">Again</button>
                        <button class="btn-secondary" onclick="answerCard(2)">Hard</button>
                        <button class="btn-primary"  onclick="answerCard(3)">Good</button>
                        <button class="btn-success"  onclick="answerCard(4)">Easy</button>
                    </div>
                    <div style="text-align:center;">
                        <a href="#" onclick="skip(); return false;" style="font-size:0.82rem; color:var(--text-muted);">Skip (no rating)</a>
                    </div>

                </div><!-- /results-section -->
            </div><!-- /card-content -->
        </div><!-- /card-phase -->

    </main>

    <script src="/static/js/menu.js"></script>
    <script>
        const DEFAULT_VOICES = { 'fr-FR': 'fr-FR-DeniseNeural', 'en-US': 'en-US-JennyNeural' };

        const LS_LAST_DECK = 'pronunciation:lastDeck';
        function lsDeckKey(deck) { return `pronunciation:deck:${deck}`; }

        function lsGet(key) {
            try { return localStorage.getItem(key); } catch { return null; }
        }
        function lsSet(key, value) {
            try { localStorage.setItem(key, value); } catch { /* storage unavailable */ }
        }

        function saveDeckSettings(deck, textField, audioField, language) {
            lsSet(lsDeckKey(deck), JSON.stringify({ textField, audioField, language }));
        }

        function restoreDeckSettings(deck) {
            const raw = lsGet(lsDeckKey(deck));
            if (!raw) return;
            let saved;
            try { saved = JSON.parse(raw); } catch { return; }
            const tSel = document.getElementById('text-field-select');
            const aSel = document.getElementById('audio-field-select');
            const lSel = document.getElementById('language-select');
            if (!tSel || !aSel || !lSel) return;
            if (saved.textField  && [...tSel.options].some(o => o.value === saved.textField))
                tSel.value = saved.textField;
            if (saved.audioField && [...aSel.options].some(o => o.value === saved.audioField))
                aSel.value = saved.audioField;
            if (saved.language   && [...lSel.options].some(o => o.value === saved.language))
                lSel.value = saved.language;
        }

        let currentCardId   = null;
        let currentCardText = '';
        let currentAssessment = null;
        let selectedDeck    = '';
        let selectedField   = '';
        let selectedAudio   = '';
        let selectedLang    = 'fr-FR';
        let mediaRecorder   = null;
        let audioChunks     = [];
        let audioContext    = null;
        let micLevelRafId   = null;
        let lastRecordingBlob = null;
        let recordingRequested = false;
        let selectedMimeType = null;

        function getSupportedMimeType() {
            const candidates = [
                'audio/webm;codecs=opus',
                'audio/ogg;codecs=opus',
                'audio/mp4',
            ];
            return candidates.find(t => MediaRecorder.isTypeSupported(t)) ?? null;
        }

        function scoreClass(n) {
            return n >= 80 ? 'score-green' : n >= 50 ? 'score-yellow' : 'score-red';
        }

        function startMicLevelLoop(stream) {
            stopMicLevelLoop();
            audioContext = new AudioContext();
            audioContext.resume().catch(() => {});
            const source   = audioContext.createMediaStreamSource(stream);
            const analyser = audioContext.createAnalyser();
            analyser.fftSize = 256;
            source.connect(analyser);
            // Route through silent gain so Chrome processes the audio graph (analyser gets real data)
            const silentGain = audioContext.createGain();
            silentGain.gain.value = 0;
            source.connect(silentGain);
            silentGain.connect(audioContext.destination);
            const data = new Uint8Array(analyser.frequencyBinCount);
            const fill = document.getElementById('mic-bar-fill');
            let silenceTicks = 0;

            function tick() {
                analyser.getByteFrequencyData(data);
                const avg = data.reduce((s, v) => s + v, 0) / data.length;
                fill.style.width = Math.min(100, (avg / 128) * 100) + '%';
                if (mediaRecorder?.state === 'recording') {
                    if (avg < 1) {
                        silenceTicks++;
                        if (silenceTicks === 60) {
                            document.getElementById('record-status').textContent =
                                '⚠ No audio detected. Check System Settings → Sound → Input.';
                        }
                    } else {
                        silenceTicks = 0;
                        document.getElementById('record-status').textContent = '';
                    }
                }
                micLevelRafId = requestAnimationFrame(tick);
            }
            micLevelRafId = requestAnimationFrame(tick);
        }

        function stopMicLevelLoop() {
            if (micLevelRafId) { cancelAnimationFrame(micLevelRafId); micLevelRafId = null; }
            if (audioContext && audioContext.state !== 'closed') { audioContext.close(); audioContext = null; }
            const fill = document.getElementById('mic-bar-fill');
            if (fill) fill.style.width = '0%';
        }

        // ── Init ──────────────────────────────────────────────────
        async function init() {
            const sRes = await fetch('/api/settings').catch(() => null);
            if (sRes && sRes.ok) {
                const s = await sRes.json();
                if (!s.azure_key_set) show('azure-banner');
            }

            try {
                const res = await fetch('/api/decks');
                if (!res.ok) throw new Error();
                const { decks } = await res.json();
                const sel = document.getElementById('deck-select');
                decks.forEach(d => {
                    const o = document.createElement('option');
                    o.value = o.textContent = d;
                    sel.appendChild(o);
                });
                if (decks.length) {
                    const lastDeck = lsGet(LS_LAST_DECK);
                    if (lastDeck && [...sel.options].some(o => o.value === lastDeck)) {
                        sel.value = lastDeck;
                        await loadFields(lastDeck);
                    } else {
                        await loadFields(decks[0]);
                    }
                    document.getElementById('start-btn').disabled = false;
                }
            } catch {
                show('anki-banner');
            }

            document.getElementById('deck-select').addEventListener('change', async e => {
                lsSet(LS_LAST_DECK, e.target.value);
                await loadFields(e.target.value);
            });
            document.getElementById('start-btn').addEventListener('click', startPracticing);
            document.getElementById('translate-btn').addEventListener('click', translateCard);

            const btn = document.getElementById('record-btn');
            btn.addEventListener('mousedown',  startRecording);
            document.addEventListener('mouseup', stopRecording);
            btn.addEventListener('touchstart', e => { e.preventDefault(); startRecording(); }, { passive: false });
            document.addEventListener('touchend',    stopRecording);
            document.addEventListener('touchcancel', stopRecording);
        }

        function show(id) { document.getElementById(id).style.display = 'block'; }
        function hide(id) { document.getElementById(id).style.display = 'none'; }

        // ── Field loading ─────────────────────────────────────────
        async function loadFields(deck) {
            const tSel = document.getElementById('text-field-select');
            const aSel = document.getElementById('audio-field-select');
            tSel.innerHTML = '';
            aSel.innerHTML = '';
            tSel.disabled = aSel.disabled = true;
            try {
                const res = await fetch(`/api/pronunciation/fields?deck=${encodeURIComponent(deck)}`);
                if (!res.ok) return;
                const { fields } = await res.json();
                fields.forEach(f => {
                    [tSel, aSel].forEach(sel => {
                        const o = document.createElement('option');
                        o.value = o.textContent = f;
                        sel.appendChild(o);
                    });
                });
                tSel.disabled = aSel.disabled = false;
                restoreDeckSettings(deck);
            } catch { /* leave disabled */ }
        }

        // ── Session start ─────────────────────────────────────────
        async function startPracticing() {
            selectedDeck  = document.getElementById('deck-select').value;
            selectedField = document.getElementById('text-field-select').value;
            selectedAudio = document.getElementById('audio-field-select').value;
            selectedLang  = document.getElementById('language-select').value;
            saveDeckSettings(selectedDeck, selectedField, selectedAudio, selectedLang);
            hide('setup-phase');
            show('card-phase');
            await loadCard();
        }

        function showSetup() {
            hide('card-phase');
            show('setup-phase');
        }

        // ── Card loading ──────────────────────────────────────────
        async function loadCard() {
            resetForRecording();
            hide('translation-panel');
            document.getElementById('translate-error').textContent = '';
            const translateBtn = document.getElementById('translate-btn');
            translateBtn.disabled = false;
            translateBtn.textContent = 'Translate to Russian';
            translateBtn.style.display = '';
            hide('results-section');
            hide('no-cards-msg');
            show('card-content');

            const url = `/api/pronunciation/card`
                + `?deck=${encodeURIComponent(selectedDeck)}`
                + `&field=${encodeURIComponent(selectedField)}`
                + `&audio_field=${encodeURIComponent(selectedAudio)}`
                + (currentCardId ? `&exclude_card_id=${currentCardId}` : '');

            const res = await fetch(url).catch(() => null);
            if (!res || res.status === 404) {
                hide('card-content');
                show('no-cards-msg');
                return;
            }
            if (!res.ok) return;

            const data = await res.json();
            currentCardId = data.card_id;
            currentCardText = data.text;
            document.getElementById('pronounce-text').textContent = data.text;

            const audioEl = document.getElementById('ref-audio');
            audioEl.src = '';
            if (data.audio_base64) {
                audioEl.src = 'data:audio/mpeg;base64,' + data.audio_base64;
            } else {
                const voice = DEFAULT_VOICES[selectedLang] || DEFAULT_VOICES['fr-FR'];
                const tRes = await fetch('/api/word-lookup/audio', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: data.text, voice }),
                }).catch(() => null);
                if (tRes && tRes.ok) {
                    const { audio_base64 } = await tRes.json();
                    audioEl.src = 'data:audio/mpeg;base64,' + audio_base64;
                }
            }
        }

        // ── WAV conversion ────────────────────────────────────────
        async function blobToWav(blob, targetSampleRate = 16000) {
            const arrayBuffer = await blob.arrayBuffer();
            const decodeCtx = new AudioContext();
            let audioBuffer;
            try {
                audioBuffer = await decodeCtx.decodeAudioData(arrayBuffer);
            } finally {
                decodeCtx.close().catch(() => {});
            }
            const numFrames = Math.round(audioBuffer.duration * targetSampleRate);
            const offCtx = new OfflineAudioContext(1, numFrames, targetSampleRate);
            const source = offCtx.createBufferSource();
            source.buffer = audioBuffer;
            source.connect(offCtx.destination);
            source.start(0);
            const resampled = await offCtx.startRendering();
            return encodeWav(resampled);
        }

        function encodeWav(audioBuffer) {
            const samples = audioBuffer.getChannelData(0);
            const numSamples = samples.length;
            const sampleRate = audioBuffer.sampleRate;
            const dataBytes = numSamples * 2;
            const buf = new ArrayBuffer(44 + dataBytes);
            const v = new DataView(buf);
            const ws = (off, s) => { for (let i = 0; i < s.length; i++) v.setUint8(off + i, s.charCodeAt(i)); };
            ws(0, 'RIFF'); v.setUint32(4, 36 + dataBytes, true); ws(8, 'WAVE');
            ws(12, 'fmt '); v.setUint32(16, 16, true); v.setUint16(20, 1, true);
            v.setUint16(22, 1, true); v.setUint32(24, sampleRate, true);
            v.setUint32(28, sampleRate * 2, true); v.setUint16(32, 2, true); v.setUint16(34, 16, true);
            ws(36, 'data'); v.setUint32(40, dataBytes, true);
            let off = 44;
            for (let i = 0; i < numSamples; i++) {
                const s = Math.max(-1, Math.min(1, samples[i]));
                v.setInt16(off, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
                off += 2;
            }
            return new Blob([buf], { type: 'audio/wav' });
        }

        // ── Recording ─────────────────────────────────────────────
        async function startRecording() {
            recordingRequested = true;
            if (mediaRecorder && mediaRecorder.state === 'recording') return;
            lastRecordingBlob = null;
            audioChunks = [];

            const mimeType = getSupportedMimeType();
            if (!mimeType) {
                document.getElementById('record-status').textContent = 'Recording not supported in this browser. Try Chrome or Firefox.';
                return;
            }
            selectedMimeType = mimeType;

            let stream;
            try {
                stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            } catch {
                document.getElementById('record-status').textContent = 'Microphone access denied.';
                return;
            }
            if (!recordingRequested) {
                stream.getTracks().forEach(t => t.stop());
                return;
            }
            startMicLevelLoop(stream);
            try {
                mediaRecorder = new MediaRecorder(stream, { mimeType });
            } catch (err) {
                stopMicLevelLoop();
                stream.getTracks().forEach(t => t.stop());
                document.getElementById('record-status').textContent = `Recording error: ${err.message}`;
                return;
            }
            mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
            mediaRecorder.start();
            document.getElementById('record-btn').classList.add('recording');
            document.getElementById('record-btn').textContent = '● Recording…';
            document.getElementById('record-status').textContent = '';
        }

        async function stopRecording() {
            recordingRequested = false;
            if (!mediaRecorder || mediaRecorder.state !== 'recording') return;
            mediaRecorder.stop();
            mediaRecorder.stream.getTracks().forEach(t => t.stop());
            stopMicLevelLoop();
            const btn = document.getElementById('record-btn');
            btn.classList.remove('recording');
            btn.textContent = '🎤 Hold to Record';
            document.getElementById('record-status').textContent = 'Evaluating…';

            await new Promise(resolve => { mediaRecorder.onstop = resolve; });

            const rawBlob = new Blob(audioChunks, { type: selectedMimeType });
            lastRecordingBlob = rawBlob;

            let submitBlob = rawBlob;
            let submitMime = selectedMimeType;
            try {
                submitBlob = await blobToWav(rawBlob);
                submitMime = 'audio/wav';
            } catch (err) {
                console.warn('WAV conversion failed, sending raw audio:', err);
            }

            const audioBase64 = await new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.readAsDataURL(submitBlob);
            });

            await submitAudio(audioBase64, submitMime);
        }

        async function submitAudio(audioBase64, mimeType = selectedMimeType) {
            try {
                const res = await fetch('/api/pronunciation/assess', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        audio_base64: audioBase64,
                        audio_mime_type: mimeType,
                        reference_text: document.getElementById('pronounce-text').textContent,
                        language: selectedLang,
                    }),
                });
                if (!res.ok) {
                    const { detail } = await res.json().catch(() => ({}));
                    document.getElementById('record-status').textContent = detail ?? `Error ${res.status}`;
                    return;
                }
                currentAssessment = await res.json();
                showResults(currentAssessment);
            } catch {
                document.getElementById('record-status').textContent = 'Network error.';
            }
        }

        function escapeHtml(s) {
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function renderColoredPhrase(referenceText, words) {
            const lookup = new Map();
            words.forEach(w => lookup.set(w.word.toLowerCase(), w));

            const parts = [];
            const re = /[A-Za-zÀ-ɏ]+/g;
            let last = 0, m;
            while ((m = re.exec(referenceText)) !== null) {
                if (m.index > last) parts.push({ type: 'other', text: referenceText.slice(last, m.index) });
                parts.push({ type: 'word', text: m[0] });
                last = m.index + m[0].length;
            }
            if (last < referenceText.length) parts.push({ type: 'other', text: referenceText.slice(last) });

            document.getElementById('pronounce-text').innerHTML = parts.map(part => {
                if (part.type !== 'word') return escapeHtml(part.text);
                const wordData = lookup.get(part.text.toLowerCase());
                if (!wordData) return `<span class="word-colored score-red" style="opacity:0.55;" title="Not recognized">${escapeHtml(part.text)}</span>`;
                const sc = scoreClass(wordData.accuracy);
                const tip = `${Math.round(wordData.accuracy)}/100${wordData.error_type !== 'None' ? ' · ' + wordData.error_type : ''}`;
                return `<span class="word-colored ${sc}" title="${escapeHtml(tip)}">${escapeHtml(part.text)}</span>`;
            }).join('');
        }

        // ── Results rendering ─────────────────────────────────────
        function showResults(data) {
            document.getElementById('record-status').textContent = '';
            show('results-section');
            document.getElementById('results-section').scrollIntoView({ behavior: 'smooth', block: 'nearest' });

            const score = Math.round(data.overall.pron_score);
            const badge = document.getElementById('overall-badge');
            badge.textContent = `PronScore: ${score}/100`;
            badge.className = `eval-badge ${score >= 80 ? 'eval-valid' : 'eval-warning'}`;

            const sub = document.getElementById('sub-scores');
            sub.innerHTML = ['accuracy', 'fluency', 'completeness'].map(k => {
                const v = Math.round(data.overall[k]);
                return `<span class="score-badge ${scoreClass(v)}">${k.charAt(0).toUpperCase() + k.slice(1)}: ${v}</span>`;
            }).join('');

            const refText = document.getElementById('pronounce-text').textContent.toLowerCase().trim();
            const heardText = (data.recognized_text || '').toLowerCase().trim();
            if (heardText && heardText !== refText) {
                document.getElementById('heard-text').textContent = data.recognized_text;
                show('heard-row');
            } else {
                hide('heard-row');
            }

            const container = document.getElementById('words-container');
            container.innerHTML = '';

            const table = document.createElement('div');
            table.className = 'phoneme-table';

            // Use syllable graphemes when phoneme symbols are absent (e.g. French)
            const hasSyllables = data.words.length &&
                (data.words[0].syllables || []).length &&
                data.words[0].syllables[0].grapheme;

            const tableHeader = document.createElement('div');
            tableHeader.className = 'phoneme-table-header';
            tableHeader.textContent = hasSyllables ? 'Syllable breakdown' : 'Phoneme breakdown';
            table.appendChild(tableHeader);

            data.words.forEach(word => {
                const row = document.createElement('div');
                row.className = 'phoneme-word-row';

                const wordCol = document.createElement('div');
                wordCol.className = 'word-col';

                const wordName = document.createElement('div');
                wordName.className = `word-col-name word-colored ${scoreClass(word.accuracy)}`;
                wordName.textContent = word.word;
                wordCol.appendChild(wordName);

                const wordScore = document.createElement('div');
                wordScore.className = 'word-col-score';
                const errorLabel = word.error_type !== 'None' ? ` · ${word.error_type}` : '';
                wordScore.textContent = `${Math.round(word.accuracy)}${errorLabel}`;
                wordCol.appendChild(wordScore);

                const pills = document.createElement('div');
                pills.className = 'pills';

                const items = hasSyllables
                    ? (word.syllables || []).map(s => ({ sym: s.grapheme, accuracy: s.accuracy }))
                    : word.phonemes.map((p, i) => ({ sym: p.symbol || String(i + 1), accuracy: p.accuracy }));

                items.forEach(item => {
                    const pill = document.createElement('div');
                    pill.className = `phoneme-pill ${scoreClass(item.accuracy)}`;

                    const sym = document.createElement('span');
                    sym.className = 'pill-sym';
                    sym.textContent = item.sym;
                    pill.appendChild(sym);

                    const barWrap = document.createElement('div');
                    barWrap.className = 'pill-bar-wrap';
                    const barFill = document.createElement('div');
                    barFill.className = 'pill-bar-fill';
                    barFill.style.width = `${Math.round(item.accuracy)}%`;
                    barWrap.appendChild(barFill);
                    pill.appendChild(barWrap);

                    const num = document.createElement('span');
                    num.className = 'pill-num';
                    num.textContent = Math.round(item.accuracy);
                    pill.appendChild(num);

                    pills.appendChild(pill);
                });

                row.appendChild(wordCol);
                row.appendChild(pills);
                table.appendChild(row);
            });

            container.appendChild(table);

            renderColoredPhrase(currentCardText, data.words);

            // Reset recommendations
            const recsBtn = document.getElementById('get-recs-btn');
            recsBtn.disabled = false;
            recsBtn.style.display = '';
            recsBtn.textContent = 'Get Recommendations';
            hide('recs-content');
            document.getElementById('recs-content').innerHTML = '';
            document.getElementById('recs-error').textContent = '';

            // Show/hide replay button
            const replayBtn = document.getElementById('replay-btn');
            if (replayBtn) replayBtn.style.display = lastRecordingBlob ? '' : 'none';
        }

        // ── Recommendations ───────────────────────────────────────
        async function getRecommendations() {
            const btn = document.getElementById('get-recs-btn');
            btn.disabled = true;
            btn.textContent = 'Loading…';
            document.getElementById('recs-error').textContent = '';

            try {
                const res = await fetch('/api/pronunciation/recommendations', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        reference_text: document.getElementById('pronounce-text').textContent,
                        language: selectedLang,
                        words: currentAssessment.words,
                    }),
                });
                if (!res.ok) {
                    const { detail } = await res.json().catch(() => ({}));
                    document.getElementById('recs-error').textContent = detail ?? 'Failed.';
                    btn.disabled = false;
                    btn.textContent = 'Retry';
                    return;
                }
                const { tips } = await res.json();
                const content = document.getElementById('recs-content');
                content.innerHTML = tips.map(t => `<p style="margin-bottom:0.4rem;">• ${t}</p>`).join('');
                show('recs-content');
                btn.style.display = 'none';
            } catch {
                document.getElementById('recs-error').textContent = 'Network error.';
                btn.disabled = false;
                btn.textContent = 'Retry';
            }
        }

        // ── Translation ───────────────────────────────────────────
        async function translateCard() {
            if (!currentCardText) return;
            const btn = document.getElementById('translate-btn');
            const errorEl = document.getElementById('translate-error');
            btn.disabled = true;
            btn.textContent = 'Translating…';
            errorEl.textContent = '';

            try {
                const res = await fetch('/api/pronunciation/translate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: currentCardText, language: selectedLang }),
                });
                if (!res.ok) {
                    const { detail } = await res.json().catch(() => ({}));
                    errorEl.textContent = detail ?? `Error ${res.status}`;
                    btn.disabled = false;
                    btn.textContent = 'Retry Translation';
                    return;
                }
                const { russian_text } = await res.json();
                document.getElementById('translation-text').textContent = russian_text;
                show('translation-panel');
                btn.style.display = 'none';
            } catch {
                errorEl.textContent = 'Network error.';
                btn.disabled = false;
                btn.textContent = 'Retry Translation';
            }
        }

        // ── Card flow ─────────────────────────────────────────────
        function resetForRecording() {
            hide('results-section');
            document.getElementById('record-status').textContent = '';
            document.getElementById('record-btn').classList.remove('recording');
            document.getElementById('record-btn').textContent = '🎤 Hold to Record';
            if (currentCardText) document.getElementById('pronounce-text').textContent = currentCardText;
            currentAssessment = null;
            const replayAudio = document.getElementById('replay-audio');
            if (replayAudio) {
                replayAudio.pause();
                if (replayAudio.src && replayAudio.src.startsWith('blob:')) {
                    URL.revokeObjectURL(replayAudio.src);
                }
                replayAudio.src = '';
            }
            const replayBtn = document.getElementById('replay-btn');
            if (replayBtn) replayBtn.style.display = 'none';
        }

        function playBackRecording() {
            if (!lastRecordingBlob) return;
            const audio = document.getElementById('replay-audio');
            if (audio.src && audio.src.startsWith('blob:')) {
                URL.revokeObjectURL(audio.src);
            }
            audio.pause();
            const url = URL.createObjectURL(lastRecordingBlob);
            audio.src = url;
            audio.onended = () => URL.revokeObjectURL(url);
            audio.play().catch(() => {});
        }

        async function answerCard(ease) {
            if (!currentCardId) return;
            await fetch('/api/pronunciation/answer', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ card_id: currentCardId, ease }),
            }).catch(() => {});
            await loadCard();
        }

        async function skip() {
            await loadCard();
        }

        init();
    </script>
</body>
</html>
